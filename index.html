<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pranayama Timer</title>
    <style>
        :root {
            --bg: #f0f4f3;
            --card: #ffffff;
            --accent: #639a88;
            --text: #2c3e50;
            --light: #94a3a8;
            --border: #e1e8e7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* Адаптивная карточка */
        .app {
            background: var(--card);
            width: 100%;
            max-width: 400px;
            height: 100%; /* Занимает доступное пространство */
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        @media (min-width: 500px) and (min-height: 600px) {
            .app {
                height: 750px;
                border-radius: 30px;
            }
        }

        /* Настройки (верх) */
        .settings { display: grid; gap: 10px; flex-shrink: 0; }
        .row { display: flex; justify-content: space-between; align-items: center; min-height: 38px; }
        .label { font-size: 14px; font-weight: 600; }
        
        select, input {
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #f9fbfb;
            font-size: 14px;
            width: 140px;
            color: var(--text);
        }

        .phase-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        .box { display: flex; flex-direction: column; gap: 3px; }
        .box span { font-size: 10px; text-transform: uppercase; color: var(--light); font-weight: 700; }
        .box input { width: 100%; }

        /* Переключатель */
        .switch { position: relative; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background: #d1d9d8; transition: .3s; border-radius: 22px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
            background: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(18px); }

        /* Визуализатор (центр - тянется) */
        .visual-area {
            flex: 1; /* Ключевое: занимает всё свободное место */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        #phase-title {
            color: var(--accent);
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .circle {
            width: 120px;
            height: 120px;
            border: 5px solid var(--accent);
            border-radius: 50%;
            will-change: transform;
        }

        .bar-container {
            width: 45px;
            height: 180px;
            background: #eee;
            border-radius: 25px;
            overflow: hidden;
            position: relative;
            display: none;
        }
        .bar-inner { position: absolute; bottom: 0; width: 100%; background: var(--accent); height: 0%; will-change: height; }

        #mode-btn {
            margin-top: 25px; border: none; background: none; color: var(--light);
            font-weight: 600; cursor: pointer; font-size: 13px;
        }

        /* Управление (низ) */
        .controls { flex-shrink: 0; padding-top: 10px; text-align: center; }
        .status { font-size: 15px; color: var(--light); margin-bottom: 15px; font-weight: 500; }
        
        .main-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            color: white;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(99, 154, 136, 0.2);
        }
        .start { background: var(--accent); }
        .stop { background: #e74c3c; display: none; }
        .main-btn:active { transform: scale(0.97); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app">
    <div class="settings">
        <div class="row">
            <span class="label">Пакет</span>
            <select id="preset">
                <option value="custom">Свой</option>
                <option value="4-4-4-4">Квадрат</option>
                <option value="4-7-8">Сон</option>
                <option value="4-0-2">Бодрость</option>
            </select>
        </div>
        <div class="row">
            <span class="label">Задержки</span>
            <label class="switch">
                <input type="checkbox" id="hold-sw" checked>
                <span class="slider"></span>
            </label>
        </div>
        <div class="phase-grid" id="grid">
            <div class="box"><span>Вдох</span><input type="number" id="in" value="4"></div>
            <div class="box h-el"><span>Задержка</span><input type="number" id="h1" value="4"></div>
            <div class="box"><span>Выдох</span><input type="number" id="out" value="4"></div>
            <div class="box h-el"><span>Задержка</span><input type="number" id="h2" value="4"></div>
        </div>
        <div class="row">
            <span class="label">Циклы</span>
            <input type="number" id="total" value="0" style="width: 70px;">
        </div>
        <div class="row">
            <span class="label">Звук</span>
            <label class="switch">
                <input type="checkbox" id="snd-sw" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="visual-area">
        <div id="phase-title">ГОТОВ</div>
        <div id="circle" class="circle"></div>
        <div id="bar" class="bar-container"><div id="bar-in" class="bar-inner"></div></div>
        <button id="mode-btn">ВИД: КРУГ</button>
    </div>

    <div class="controls">
        <div id="counter" class="status">Цикл 0 из 0</div>
        <button id="start" class="main-btn start">СТАРТ</button>
        <button id="stop" class="main-btn stop">СТОП</button>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBell() {
        if (!document.getElementById('snd-sw').checked) return;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sine'; o.frequency.setValueAtTime(880, audioCtx.currentTime); // Мягкий высокий тон
        g.gain.setValueAtTime(0, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        o.start(); o.stop(audioCtx.currentTime + 0.5);
    }

    let state = { running: false, phases: [], pIdx: 0, cycle: 1, startT: 0, raf: null, isCircle: true };

    const d = {
        in: document.getElementById('in'), h1: document.getElementById('h1'),
        out: document.getElementById('out'), h2: document.getElementById('h2'),
        total: document.getElementById('total'), preset: document.getElementById('preset'),
        hold: document.getElementById('hold-sw'), start: document.getElementById('start'),
        stop: document.getElementById('stop'), title: document.getElementById('phase-title'),
        circle: document.getElementById('circle'), barIn: document.getElementById('bar-in'),
        count: document.getElementById('counter'), mode: document.getElementById('mode-btn')
    };

    function getPhases() {
        const h = d.hold.checked;
        return [
            { n: 'Вдох', t: parseInt(d.in.value), s: [1, 1.6], b: [0, 100] },
            { n: 'Пауза', t: h ? parseInt(d.h1.value) : 0, s: [1.6, 1.6], b: [100, 100] },
            { n: 'Выдох', t: parseInt(d.out.value), s: [1.6, 1], b: [100, 0] },
            { n: 'Пауза', t: h ? parseInt(d.h2.value) : 0, s: [1, 1], b: [0, 0] }
        ].filter(p => p.t > 0);
    }

    function loop() {
        if (!state.running) return;
        const now = Date.now();
        const elapsed = (now - state.startT) / 1000;
        const p = state.phases[state.pIdx];

        if (elapsed >= p.t) {
            state.pIdx++;
            if (state.pIdx >= state.phases.length) {
                state.pIdx = 0; state.cycle++;
                const lim = parseInt(d.total.value);
                if (lim > 0 && state.cycle > lim) return reset();
            }
            state.startT = now;
            playBell();
            d.title.innerText = state.phases[state.pIdx].n;
            d.count.innerText = `Цикл ${state.cycle} из ${d.total.value == 0 ? '∞' : d.total.value}`;
        }

        const pct = Math.min((Date.now() - state.startT) / (state.phases[state.pIdx].t * 1000), 1);
        const cur = state.phases[state.pIdx];

        if (state.isCircle) {
            const s = cur.s[0] + (cur.s[1] - cur.s[0]) * pct;
            d.circle.style.transform = `scale(${s})`;
        } else {
            const h = cur.b[0] + (cur.b[1] - cur.b[0]) * pct;
            d.barIn.style.height = `${h}%`;
        }
        state.raf = requestAnimationFrame(loop);
    }

    function reset() {
        state.running = false; cancelAnimationFrame(state.raf);
        d.start.style.display = 'block'; d.stop.style.display = 'none';
        d.title.innerText = 'ГОТОВ'; d.circle.style.transform = 'scale(1)'; d.barIn.style.height = '0%';
    }

    d.start.onclick = () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        state.phases = getPhases(); if (!state.phases.length) return;
        state.running = true; state.pIdx = 0; state.cycle = 1; state.startT = Date.now();
        d.start.style.display = 'none'; d.stop.style.display = 'block';
        playBell(); d.title.innerText = state.phases[0].n;
        d.count.innerText = `Цикл 1 из ${d.total.value == 0 ? '∞' : d.total.value}`;
        loop();
    };

    d.stop.onclick = reset;
    d.hold.onchange = () => {
        document.querySelectorAll('.h-el').forEach(el => d.hold.checked ? el.classList.remove('hidden') : el.classList.add('hidden'));
    };
    d.preset.onchange = () => {
        const v = d.preset.value;
        if (v === '4-4-4-4') { d.in.value=4; d.h1.value=4; d.out.value=4; d.h2.value=4; d.hold.checked=true; }
        else if (v === '4-7-8') { d.in.value=4; d.h1.value=7; d.out.value=8; d.h2.value=0; d.hold.checked=true; }
        else if (v === '4-0-2') { d.in.value=4; d.h1.value=0; d.out.value=2; d.h2.value=0; d.hold.checked=false; }
        d.hold.onchange();
    };
    d.mode.onclick = () => {
        state.isCircle = !state.isCircle;
        d.circle.style.display = state.isCircle ? 'block' : 'none';
        document.getElementById('bar').style.display = state.isCircle ? 'none' : 'block';
        d.mode.innerText = state.isCircle ? 'ВИД: КРУГ' : 'ВИД: СТОЛБЕЦ';
    };
    [d.in, d.h1, d.out, d.h2].forEach(i => i.oninput = () => d.preset.value = 'custom');
</script>
</body>
</html>
