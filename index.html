<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Пранаяма Таймер</title>
    <style>
        :root {
            --bg-color: #f0f4f3;
            --card-bg: #ffffff;
            --primary: #639a88;
            --text-main: #2d4039;
            --text-muted: #798f86;
            --border-color: #e2e8e5;
        }

        /* Жестко фиксируем фон на весь экран */
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh; 
            margin: 0;
            padding: 15px; /* Защитный отступ от краев экрана */
            box-sizing: border-box;
            overflow: hidden; /* Фон никогда не скроллится */
        }

        /* Непробиваемый контейнер */
        .container {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            width: 100%;
            max-width: 400px;
            max-height: 100%; /* Не дает карточке стать больше экрана */
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            box-sizing: border-box;
            /* Если экран микроскопический - скролл появится ТОЛЬКО внутри белой карточки */
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .container::-webkit-scrollbar { display: none; }

        /* Запрещаем элементам сплющиваться при нехватке высоты */
        h1, .status-area, .breathing-area, .controls-section, .settings-grid, button {
            flex-shrink: 0;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 1.4rem;
            font-weight: 600;
            text-align: center;
        }

        .status-area {
            min-height: 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 5px;
        }

        #phase-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 2px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #cycle-text {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            display: none;
        }

        /* Выделенный блок анимации, куда текст не может попасть */
        .breathing-area {
            position: relative;
            min-height: 180px; 
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 5px 0 15px 0;
        }

        .circle {
            width: 100px;
            height: 100px;
            background: rgba(99, 154, 136, 0.15);
            border: 2px solid var(--primary);
            border-radius: 50%;
            position: absolute;
            z-index: 1;
            transition: transform 0.5s ease-out; 
            transform: scale(1);
        }

        .bar-container {
            width: 70px;
            height: 140px;
            background: rgba(99, 154, 136, 0.1);
            border: 2px solid var(--primary);
            border-radius: 16px;
            position: absolute;
            z-index: 1;
            display: none;
            overflow: hidden;
            align-items: flex-end;
        }

        .bar-fill {
            width: 100%;
            height: 100%;
            background: rgba(99, 154, 136, 0.4);
            transform-origin: bottom;
            transform: scaleY(0);
            transition: transform 0.5s ease-out;
        }

        .info {
            z-index: 2;
            pointer-events: none;
            text-align: center;
        }

        #timer-text {
            font-size: 2.5rem;
            font-weight: 300;
            line-height: 1;
            color: var(--text-main);
        }

        .controls-section {
            text-align: left;
            margin-bottom: 10px;
        }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .toggle-row:last-child {
            border-bottom: none;
        }

        select {
            padding: 5px 8px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-main);
            font-family: inherit;
            outline: none;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 22px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(18px); }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .input-group label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .input-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: #fafcfb;
            color: var(--text-main);
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus { border-color: var(--primary); }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            width: 100%;
            font-size: 1.05rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin-top: auto; /* Прижимает кнопку к низу, если есть лишнее место */
        }

        button:active { transform: scale(0.98); }
        button.stop { background: #e07a5f; }

        /* АДАПТИВНОСТЬ ПО ВЫСОТЕ (Для мобильных телефонов)
         Делает элементы компактнее, чтобы все уместилось на 1 экране без скролла.
        */
        @media (max-height: 750px) {
            .container { padding: 1.2rem; }
            h1 { font-size: 1.2rem; margin-bottom: 5px; }
            .status-area { min-height: 38px; }
            .toggle-row { padding: 6px 0; }
            .settings-grid { gap: 8px; margin-bottom: 12px; }
            .input-group input { padding: 6px; }
            button { padding: 12px; }
            
            /* Уменьшаем круг и его коробку */
            .circle { width: 80px; height: 80px; }
            /* При scale(1.6) круг станет 128px. Значит 140px высоты короба хватит с запасом! */
            .breathing-area { min-height: 140px; margin: 5px 0 10px 0; }
            .bar-container { width: 60px; height: 120px; }
            #timer-text { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Пранаяма</h1>
        
        <div class="status-area">
            <div id="phase-text">Готовность</div>
            <div id="cycle-text">Цикл 1</div>
        </div>

        <div class="breathing-area">
            <div class="circle" id="b-circle"></div>
            <div class="bar-container" id="b-bar-container">
                <div class="bar-fill" id="b-bar"></div>
            </div>
            <div class="info">
                <div id="timer-text">--</div>
            </div>
        </div>

        <div class="controls-section">
            <div class="toggle-row">
                <span>Техника</span>
                <select id="preset-type" onchange="applyPreset()">
                    <option value="custom">Свои значения</option>
                    <option value="box" data-in="4" data-h1="4" data-out="4" data-h2="4">Квадрат (4-4-4-4)</option>
                    <option value="relax" data-in="4" data-h1="7" data-out="8" data-h2="0">Сон (4-7-8)</option>
                    <option value="energy" data-in="4" data-h1="0" data-out="2" data-h2="0">Бодрость (4-0-2)</option>
                </select>
            </div>
            <div class="toggle-row">
                <span>Звук (гонг)</span>
                <label class="switch">
                    <input type="checkbox" id="sound-toggle">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="toggle-row">
                <span>Отображение</span>
                <select id="vis-type" onchange="updateVisualizer()">
                    <option value="circle">Круг</option>
                    <option value="bar">Столбец</option>
                </select>
            </div>
            <div class="toggle-row">
                <span>Задержки дыхания</span>
                <label class="switch">
                    <input type="checkbox" id="holds-toggle" checked onchange="toggleHolds(false)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="settings-grid" id="settings-grid">
            <div class="input-group">
                <label>Вдох (с)</label>
                <input type="number" id="t-in" value="4" min="1" oninput="markCustom()">
            </div>
            <div class="input-group hold-group">
                <label>Задержка</label>
                <input type="number" id="t-hold1" value="4" min="0" oninput="markCustom()">
            </div>
            <div class="input-group">
                <label>Выдох (с)</label>
                <input type="number" id="t-out" value="4" min="1" oninput="markCustom()">
            </div>
            <div class="input-group hold-group">
                <label>Задержка</label>
                <input type="number" id="t-hold2" value="4" min="0" oninput="markCustom()">
            </div>
            <div class="input-group" style="grid-column: span 2;">
                <label>Циклы (0 = бесконечно)</label>
                <input type="number" id="cycles-input" value="0" min="0">
            </div>
        </div>

        <button id="btn-action" onclick="toggleTimer()">Начать практику</button>
    </div>

    <script>
        let isRunning = false;
        let timerInterval;
        let phases = [];
        let currentPhaseIndex = 0;
        let timeLeft = 0;
        let currentCycle = 1;
        let maxCycles = 0;
        let isFirstPhaseOfStart = true;
        let audioCtx = null;

        const circle = document.getElementById('b-circle');
        const barContainer = document.getElementById('b-bar-container');
        const barFill = document.getElementById('b-bar');
        const phaseText = document.getElementById('phase-text');
        const timerText = document.getElementById('timer-text');
        const cycleText = document.getElementById('cycle-text');
        const btnAction = document.getElementById('btn-action');
        const visTypeSelect = document.getElementById('vis-type');
        const holdsToggle = document.getElementById('holds-toggle');
        const holdGroups = document.querySelectorAll('.hold-group');
        const presetSelect = document.getElementById('preset-type');

        function markCustom() {
            presetSelect.value = 'custom';
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playGong(frequency = 329.63, duration = 2.5) {
            if (!document.getElementById('sound-toggle').checked) return;
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.type = 'sine';
            const now = audioCtx.currentTime;
            
            osc.frequency.setValueAtTime(frequency, now);

            // Идеальное сглаживание без щелчков
            gainNode.gain.cancelScheduledValues(now);
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(0.25, now + 0.1);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration - 0.1);
            gainNode.gain.linearRampToValueAtTime(0, now + duration);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start(now);
            osc.stop(now + duration + 0.05); 
        }

        function applyPreset() {
            const opt = presetSelect.options[presetSelect.selectedIndex];
            if (opt.value === 'custom') return;
            
            document.getElementById('t-in').value = opt.dataset.in;
            document.getElementById('t-hold1').value = opt.dataset.h1;
            document.getElementById('t-out').value = opt.dataset.out;
            document.getElementById('t-hold2').value = opt.dataset.h2;
            
            const hasHolds = parseInt(opt.dataset.h1) > 0 || parseInt(opt.dataset.h2) > 0;
            holdsToggle.checked = hasHolds;
            
            toggleHolds(true);
        }

        function toggleHolds(isFromPreset = false) {
            const hasHolds = holdsToggle.checked;
            holdGroups.forEach(group => {
                group.style.display = hasHolds ? 'flex' : 'none';
            });
            
            if (!isFromPreset) {
                presetSelect.value = 'custom';
            }
        }

        function updateVisualizer() {
            const type = visTypeSelect.value;
            if (type === 'circle') {
                circle.style.display = 'block';
                barContainer.style.display = 'none';
            } else {
                circle.style.display = 'none';
                barContainer.style.display = 'flex';
            }
        }

        function updateCycleText() {
            cycleText.style.display = 'block';
            if (maxCycles > 0) {
                cycleText.innerText = `Цикл ${currentCycle} из ${maxCycles}`;
            } else {
                cycleText.innerText = `Цикл ${currentCycle}`;
            }
        }

        function toggleTimer() {
            if (isRunning) stopTimer();
            else startTimer();
        }

        function startTimer() {
            const tIn = parseInt(document.getElementById('t-in').value) || 0;
            const tOut = parseInt(document.getElementById('t-out').value) || 0;
            let tHold1 = holdsToggle.checked ? (parseInt(document.getElementById('t-hold1').value) || 0) : 0;
            let tHold2 = holdsToggle.checked ? (parseInt(document.getElementById('t-hold2').value) || 0) : 0;
            
            maxCycles = parseInt(document.getElementById('cycles-input').value) || 0;

            phases = [
                { name: 'Вдох', time: tIn, state: 'high' },
                { name: 'Задержка', time: tHold1, state: 'high' },
                { name: 'Выдох', time: tOut, state: 'low' },
                { name: 'Задержка', time: tHold2, state: 'low' }
            ].filter(p => p.time > 0);

            if (phases.length === 0) return;

            if (document.getElementById('sound-toggle').checked) initAudio();

            isRunning = true;
            btnAction.innerText = 'Остановить';
            btnAction.classList.add('stop');
            
            visTypeSelect.disabled = true;
            holdsToggle.disabled = true;
            presetSelect.disabled = true;

            currentPhaseIndex = 0;
            currentCycle = 1;
            isFirstPhaseOfStart = true;
            
            runPhase();
        }

        function runPhase() {
            if (currentPhaseIndex === 0 && !isFirstPhaseOfStart) {
                currentCycle++;
                if (maxCycles > 0 && currentCycle > maxCycles) {
                    stopTimer();
                    playGong(440, 3);
                    setTimeout(() => playGong(440, 3), 500);
                    return;
                }
            }
            isFirstPhaseOfStart = false;
            updateCycleText();

            playGong(329.63, 2);

            let phase = phases[currentPhaseIndex];
            phaseText.innerText = phase.name;
            timeLeft = phase.time;
            timerText.innerText = timeLeft;

            const visType = visTypeSelect.value;
            const transitionStyle = `transform ${phase.time}s linear`;

            let targetScale = 1;
            if (visType === 'circle') {
                targetScale = (phase.state === 'high') ? 1.6 : 1;
            } else {
                targetScale = (phase.state === 'high') ? 1 : 0; 
            }

            if (visType === 'circle') {
                circle.style.transition = transitionStyle;
                circle.style.transform = `scale(${targetScale})`;
            } else {
                barFill.style.transition = transitionStyle;
                barFill.style.transform = `scaleY(${targetScale})`;
            }

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    timerText.innerText = timeLeft;
                } else {
                    clearInterval(timerInterval);
                    currentPhaseIndex = (currentPhaseIndex + 1) % phases.length;
                    runPhase();
                }
            }, 1000);
        }

        function stopTimer() {
            isRunning = false;
            clearInterval(timerInterval);
            btnAction.innerText = 'Начать практику';
            btnAction.classList.remove('stop');
            phaseText.innerText = 'Готовность';
            timerText.innerText = '--';
            cycleText.style.display = 'none';
            
            visTypeSelect.disabled = false;
            holdsToggle.disabled = false;
            presetSelect.disabled = false;

            circle.style.transition = 'transform 0.5s ease-out';
            circle.style.transform = 'scale(1)';
            
            barFill.style.transition = 'transform 0.5s ease-out';
            barFill.style.transform = 'scaleY(0)'; 
        }

        toggleHolds(true); 
        updateVisualizer();
    </script>
</body>
</html>
