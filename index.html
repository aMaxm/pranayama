<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pranayama Timer</title>
    <style>
        :root {
            --bg: #f0f4f3;
            --card: #ffffff;
            --accent: #639a88;
            --text: #2c3e50;
            --light: #94a3a8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            padding: env(safe-area-inset-top) env(safe-area-inset-bottom);
        }

        .app-container {
            background: var(--card);
            width: 100%;
            max-width: 400px;
            height: 100dvh;
            max-height: 850px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        @media (min-width: 500px) and (min-height: 600px) {
            .app-container { height: 90vh; border-radius: 25px; }
        }

        .settings-block { flex-shrink: 0; display: grid; gap: 8px; }
        .row { display: flex; justify-content: space-between; align-items: center; min-height: 35px; }
        .label { font-size: 14px; font-weight: 600; }
        
        select, input[type="number"] {
            padding: 8px;
            border: 1px solid #e1e8e7;
            border-radius: 8px;
            background: #f9fbfb;
            font-size: 14px;
            width: 140px;
            color: var(--text);
        }

        .phase-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        .input-group { display: flex; flex-direction: column; gap: 2px; }
        .input-group span { font-size: 10px; text-transform: uppercase; color: var(--light); font-weight: 700; }
        .input-group input { width: 100%; }

        .switch { position: relative; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background: #d1d9d8; transition: .3s; border-radius: 22px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
            background: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(18px); }

        /* Визуализатор */
        .viz-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 0;
        }

        #phase-title {
            color: var(--accent);
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .circle-wrap {
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .circle {
            width: 100%;
            height: 100%;
            aspect-ratio: 1 / 1; /* Только круг */
            border: 5px solid var(--accent);
            border-radius: 50%;
            will-change: transform;
        }

        .bar-wrap {
            width: 40px; height: 180px; background: #eee; border-radius: 20px;
            overflow: hidden; position: relative; display: none;
        }
        .bar-fill { position: absolute; bottom: 0; width: 100%; background: var(--accent); height: 0%; }

        #mode-btn {
            margin-top: 20px; border: none; background: none; color: var(--light);
            font-weight: 700; cursor: pointer; font-size: 12px;
        }

        /* Кнопки */
        .footer-block { flex-shrink: 0; padding-top: 10px; text-align: center; }
        .cycle-info { font-size: 15px; color: var(--light); margin-bottom: 12px; font-weight: 600; }
        
        .main-btn {
            width: 100%; padding: 18px; border: none; border-radius: 16px;
            font-size: 18px; font-weight: 800; cursor: pointer; color: white; transition: 0.2s;
        }
        .btn-start { background: var(--accent); }
        .btn-stop { background: #e74c3c; display: none; }
        .main-btn:active { transform: scale(0.97); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="settings-block">
        <div class="row">
            <span class="label">Пакет</span>
            <select id="preset">
                <option value="custom">Свой</option>
                <option value="4-4-4-4">Квадрат (4-4-4-4)</option>
                <option value="4-7-8">Сон (4-7-8)</option>
                <option value="4-0-2">Бодрость (4-0-2)</option>
            </select>
        </div>
        <div class="row">
            <span class="label">Задержки</span>
            <label class="switch">
                <input type="checkbox" id="hold-sw" checked>
                <span class="slider"></span>
            </label>
        </div>
        <div class="phase-inputs">
            <div class="input-group"><span>Вдох</span><input type="number" id="in" value="4"></div>
            <div class="input-group hold-f"><span>Задержка</span><input type="number" id="h1" value="4"></div>
            <div class="input-group"><span>Выдох</span><input type="number" id="out" value="4"></div>
            <div class="input-group hold-f"><span>Задержка</span><input type="number" id="h2" value="4"></div>
        </div>
        <div class="row">
            <span class="label">Циклы</span>
            <input type="number" id="total" value="0" style="width: 70px;">
        </div>
        <div class="row">
            <span class="label">Звук (300 Гц)</span>
            <label class="switch">
                <input type="checkbox" id="snd-sw" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="viz-section">
        <div id="phase-title">ГОТОВ</div>
        <div class="circle-wrap">
            <div id="circle" class="circle"></div>
        </div>
        <div id="bar" class="bar-wrap"><div id="bar-fill" class="bar-fill"></div></div>
        <button id="mode-btn">ВИД: КРУГ</button>
    </div>

    <div class="footer-block">
        <div id="counter" class="cycle-info">Цикл 0 из 0</div>
        <button id="start-btn" class="main-btn btn-start">СТАРТ</button>
        <button id="stop-btn" class="main-btn btn-stop">СТОП</button>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playDeepSound() {
        if (!document.getElementById('snd-sw').checked) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, audioCtx.currentTime); // Тот самый звук
        
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 1.5);
    }

    let state = { active: false, phases: [], pIdx: 0, cycle: 1, start: 0, raf: null, isCircle: true };

    const dom = {
        in: document.getElementById('in'), h1: document.getElementById('h1'),
        out: document.getElementById('out'), h2: document.getElementById('h2'),
        total: document.getElementById('total'), preset: document.getElementById('preset'),
        hold: document.getElementById('hold-sw'), start: document.getElementById('start-btn'),
        stop: document.getElementById('stop-btn'), title: document.getElementById('phase-title'),
        circle: document.getElementById('circle'), barF: document.getElementById('bar-fill'),
        count: document.getElementById('counter'), mode: document.getElementById('mode-btn')
    };

    function getPhases() {
        const h = dom.hold.checked;
        return [
            { n: 'Вдох', t: parseInt(dom.in.value), s: [1, 1.6], b: [0, 100] },
            { n: 'Пауза', t: h ? parseInt(dom.h1.value) : 0, s: [1.6, 1.6], b: [100, 100] },
            { n: 'Выдох', t: parseInt(dom.out.value), s: [1.6, 1], b: [100, 0] },
            { n: 'Пауза', t: h ? parseInt(dom.h2.value) : 0, s: [1, 1], b: [0, 0] }
        ].filter(p => p.t > 0);
    }

    function loop() {
        if (!state.active) return;
        const now = Date.now();
        const elapsed = (now - state.start) / 1000;
        const p = state.phases[state.pIdx];

        if (elapsed >= p.t) {
            state.pIdx++;
            if (state.pIdx >= state.phases.length) {
                state.pIdx = 0; state.cycle++;
                const lim = parseInt(dom.total.value);
                if (lim > 0 && state.cycle > lim) return stop();
            }
            state.start = now;
            updateUI();
        }

        const pct = Math.min((Date.now() - state.start) / (state.phases[state.pIdx].t * 1000), 1);
        const cur = state.phases[state.pIdx];

        if (state.isCircle) {
            const s = cur.s[0] + (cur.s[1] - cur.s[0]) * pct;
            dom.circle.style.transform = `scale(${s})`;
        } else {
            const h = cur.b[0] + (cur.b[1] - cur.b[0]) * pct;
            dom.barF.style.height = `${h}%`;
        }
        state.raf = requestAnimationFrame(loop);
    }

    function updateUI() {
        dom.title.innerText = state.phases[state.pIdx].n;
        dom.count.innerText = `Цикл ${state.cycle} из ${dom.total.value == 0 ? '∞' : dom.total.value}`;
        playDeepSound();
    }

    function stop() {
        state.active = false; cancelAnimationFrame(state.raf);
        dom.start.style.display = 'block'; dom.stop.style.display = 'none';
        dom.title.innerText = 'ГОТОВ'; dom.circle.style.transform = 'scale(1)'; dom.barF.style.height = '0%';
    }

    dom.start.onclick = () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        state.phases = getPhases(); if (!state.phases.length) return;
        state.active = true; state.pIdx = 0; state.cycle = 1; state.start = Date.now();
        dom.start.style.display = 'none'; dom.stop.style.display = 'block';
        updateUI(); loop();
    };

    dom.stop.onclick = stop;
    dom.hold.onchange = () => {
        document.querySelectorAll('.hold-f').forEach(el => dom.hold.checked ? el.classList.remove('hidden') : el.classList.add('hidden'));
    };
    dom.preset.onchange = () => {
        const v = dom.preset.value;
        if (v === '4-4-4-4') { dom.in.value=4; dom.h1.value=4; dom.out.value=4; dom.h2.value=4; dom.hold.checked=true; }
        else if (v === '4-7-8') { dom.in.value=4; dom.h1.value=7; dom.out.value=8; dom.h2.value=0; dom.hold.checked=true; }
        else if (v === '4-0-2') { dom.in.value=4; dom.h1.value=0; dom.out.value=2; dom.h2.value=0; dom.hold.checked=false; }
        dom.hold.onchange();
    };
    dom.mode.onclick = () => {
        state.isCircle = !state.isCircle;
        dom.circle.parentElement.style.display = state.isCircle ? 'flex' : 'none';
        document.getElementById('bar').style.display = state.isCircle ? 'none' : 'block';
        dom.mode.innerText = state.isCircle ? 'ВИД: КРУГ' : 'ВИД: СТОЛБЕЦ';
    };
    [dom.in, dom.h1, dom.out, dom.h2].forEach(i => i.oninput = () => dom.preset.value = 'custom');
</script>
</body>
</html>
